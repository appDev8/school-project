<script>
  // Surface any error visibly so a blank page never happens silently.
  window.addEventListener('error', function(e){
    var r = document.getElementById('root');
    if (r) r.innerHTML = '<div style="padding:40px;font-family:ui-monospace,monospace;color:#b91c1c;background:#fef2f2;border-left:4px solid #b91c1c;margin:24px;border-radius:8px;"><div style="font-weight:600;font-size:16px;margin-bottom:8px;">JavaScript error</div><div style="white-space:pre-wrap;font-size:12px;">'+ (e.message || e.error || 'unknown') +'\n\n'+ (e.filename || '') +':'+ (e.lineno || '') +':'+ (e.colno || '') +'</div></div>';
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = document.getElementById('root');
    if (r) r.innerHTML = '<div style="padding:40px;font-family:ui-monospace,monospace;color:#b91c1c;">Promise rejection: '+ (e.reason && e.reason.message || e.reason) +'</div>';
  });
  // Belt-and-braces: if React hasn't mounted in 6s, show diagnostics.
  setTimeout(function(){
    var r = document.getElementById('root');
    if (!r || !r.querySelector('aside')) {
      var m = document.getElementById('boot-msg');
      if (m) m.innerHTML = 'React=' + (typeof React) + ' · ReactDOM=' + (typeof ReactDOM) + ' · Babel=' + (typeof Babel) + ' · Chart=' + (typeof Chart) + ' · jspdf=' + (typeof window.jspdf) + ' · PptxGenJS=' + (typeof window.PptxGenJS) + '<br/>If this row stays here, the most likely cause is a CDN being blocked.';

  }, 6000);
</script>

const downloadFile = (filename, content, mime='text/plain') => {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

const exportCSV = (filename, headers, rows) => {
  const esc = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const body = [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))].join('\n');
  downloadFile(filename, body, 'text/csv;charset=utf-8;');
};

const KpiCard = ({ label, value, suffix, delta, tone, spark }) => {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    if (ref.current._chart) ref.current._chart.destroy();
    ref.current._chart = new window.Chart(ref.current, {
      type:'line',
      data:{ labels: spark.map((_,i)=>i), datasets:[{ data: spark, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.12)', fill:true, tension:0.35, pointRadius:0, borderWidth:2 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false }, tooltip:{ enabled:false }}, scales:{ x:{ display:false }, y:{ display:false }}, animation:false }
    });
  }, [spark]);
  return (
    <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm hover:shadow transition relative overflow-hidden">
      <div className="flex items-start justify-between">
        <div className="text-xs uppercase tracking-wide text-slate-500 font-medium">{label}</div>
        <StatusDot tone={tone} />
      </div>
      <div className="mt-2 flex items-baseline gap-1">
        <div className="text-2xl font-semibold text-slate-900">{value}</div>
        <div className="text-sm text-slate-500">{suffix}</div>
      </div>
      <div className="text-xs text-slate-500 mt-1">{delta}</div>
      <div className="h-10 mt-2"><canvas ref={ref}></canvas></div>

  );
};

    primary:'bg-slate-900 text-white hover:bg-slate-800 border-slate-900',

const Chart = ({ type, data, options, height=180 }) => {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    if (ref.current._chart) ref.current._chart.destroy();
    ref.current._chart = new window.Chart(ref.current, { type, data, options });
    return () => { ref.current && ref.current._chart && ref.current._chart.destroy(); };
  }, [JSON.stringify(data), JSON.stringify(options), type]);
  return <div style={{ height }}><canvas ref={ref}></canvas></div>;
};

/* ========== MODULE: VARIABLES ========== */
const Variables = () => {
  // Interaction strength matrix (symmetric)
  const grid = useMemo(() => {
    const m = {};
    VARIABLES.forEach(v => { m[v.id] = {}; VARIABLES.forEach(w => { m[v.id][w.id] = 0; }); });
    INTERACTIONS.forEach(([a,b,s]) => { m[a][b]=s; m[b][a]=s; });
    return m;
  }, []);
  const cellTone = (s) => s===0 ? 'bg-slate-50' : s<=2 ? 'bg-amber-100' : s<=3 ? 'bg-amber-200' : s<=4 ? 'bg-rose-200' : 'bg-rose-400 text-white';
  return (
    <div className="space-y-5">
      <Section title="Variable interaction matrix" subtitle="Decisions never move only one variable. Strength 0–5; darker = stronger second-order effect.">
        <div className="overflow-x-auto">
          <table className="text-[10px] border-collapse">
            <thead>
              <tr>
                <th></th>
                {VARIABLES.map(v => <th key={v.id} className="px-1 py-1 font-medium text-slate-700 vertical">{v.id}</th>)}
              </tr>
            </thead>
            <tbody>
              {VARIABLES.map(r => (
                <tr key={r.id}>
                  <th className="text-right pr-2 font-medium text-slate-700 whitespace-nowrap" title={r.label}>{r.id} · {r.label.slice(0,28)}</th>
                  {VARIABLES.map(c => {
                    const s = grid[r.id][c.id];
                    return (
                      <td key={c.id} className={`border border-white ${cellTone(s)} text-center w-7 h-7`} title={`${r.label} ↔ ${c.label}: ${s}`}>{s||''}</td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Section>

      <Section title="Strongest interactions (with implications)" subtitle="The dominant tensions every decision must address">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-600 text-xs uppercase">
              <tr><th className="text-left py-2 px-2">A</th><th className="text-left py-2 px-2">B</th><th className="text-left py-2 px-2">Strength</th><th className="text-left py-2 px-2">Implication</th></tr>
            </thead>
            <tbody>
              {INTERACTIONS.sort((a,b)=>b[2]-a[2]).map(([a,b,s,note],i) => {
                const A = VARIABLES.find(v=>v.id===a).label;
                const B = VARIABLES.find(v=>v.id===b).label;
                return (
                  <tr key={i} className="border-t border-slate-100">
                    <td className="py-2 px-2 text-slate-700">{A}</td>
                    <td className="py-2 px-2 text-slate-700">{B}</td>
                    <td className="py-2 px-2">
                      <span className={`text-xs font-semibold px-1.5 py-0.5 rounded ${s===5?'bg-rose-100 text-rose-700':s===4?'bg-amber-100 text-amber-700':'bg-emerald-100 text-emerald-700'}`}>{s}</span>
                    </td>
                    <td className="py-2 px-2 text-slate-700">{note}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Section>

      <Section title="Stress tests — Base / Adverse / Stretch">
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 text-sm">
          <div className="border border-slate-200 rounded-xl p-3 bg-emerald-50/30">

              STAKEHOLDERS.map(s=>[s.group,s.name,s.interest,s.influence,s.strategy,s.cadence,s.owner]))}>Stakeholder Map</Btn>
            <Btn full size="sm" tone="ghost" onClick={() => exportCSV('SchoolProject_LMS.csv',
              ['Tool','Type','PBL fit','Cost','NSW','Pros','Cons'], LMS_OPTIONS.map(o=>[o.name,o.type,o.pbl,o.cost,o.nsw,o.pros,o.cons]))}>LMS Evaluation</Btn>
            <Btn full size="sm" tone="ghost" onClick={() => exportCSV('SchoolProject_EnrolmentFunnel.csv',
              ['Stage','N','Conversion'], ENROLMENT_FUNNEL.map(f=>[f.stage,f.n,f.conv]))}>Enrolment Funnel</Btn>
          </div>
        </div>
      </div>
    </Section>

    <Section title="What each report shows the Board (and how it answers a likely interview question)">
      <ul className="text-sm space-y-2 list-disc pl-5 text-slate-700">
        <li><b>Board Pack (PDF)</b> — when asked “What will your first 6 board meetings look like?”, this <em>is</em> the artefact for meeting one.</li>
        <li><b>Pitch Deck (PPTX)</b> — when asked “Sell us the school in 5 minutes”, slides 1–4 do that.</li>
        <li><b>Risk Register (CSV)</b> — when asked “What keeps you up at night?”, this proves I sleep with the answer next to me.</li>
        <li><b>Staffing Plan (CSV)</b> — when asked “Who do you hire first and why?”, the dependencies and reasoning are explicit.</li>
        <li><b>Compliance Tracker (CSV)</b> — when asked “How do you make NESA registration risk-free?”, this is the auditable trail.</li>
        <li><b>Stakeholder Map (CSV)</b> — when asked “How will you build community?”, this is who and at what cadence.</li>
      </ul>
    </Section>
  </div>
);

/* ========== MODULE: HEALTH CHECK MODAL ========== */
const HealthCheckBody = () => {
  const overall = Math.round(HEALTH_PILLARS.reduce((s,p)=>s+p.score,0)/HEALTH_PILLARS.length);
  return (
    <div>
      <div className="text-center">
        <div className="text-5xl font-bold text-slate-900">{overall}<span className="text-2xl text-slate-500">/100</span></div>
        <div className="text-sm text-slate-500 mt-1">Composite Foundation Health Score</div>
      </div>
      <div className="space-y-2 mt-4">
        {HEALTH_PILLARS.map(p => (
          <div key={p.key} className="border border-slate-200 rounded-lg p-2.5">
            <div className="flex items-center justify-between">
              <span className="font-medium text-slate-900 flex items-center gap-2"><StatusDot tone={p.tone}/>{p.label}</span>
              <span className="text-sm font-semibold text-slate-700">{p.score}/100</span>
            </div>
            <div className="text-xs text-slate-600 mt-1">{p.note}</div>
          </div>
        ))}
      </div>
      <div className="text-xs text-slate-500 mt-4">Run cadence: daily automated + monthly board-attested.</div>
    </div>
  );
};

/* ========== TOPBAR & SIDEBAR ========== */
const TopBar = ({ view, setHealthOpen }) => (
  <header className="sticky top-0 z-20 bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between">
    <div>
      <div className="text-xs uppercase tracking-wider text-slate-500 font-medium">School Project · Founding Principal Console</div>
      <div className="text-lg font-semibold text-slate-900">{NAV.find(n => n.id === view)?.label}</div>
    </div>
    <div className="flex items-center gap-3">
      <div className="hidden lg:block text-right">
        <div className="text-sm font-medium text-slate-900">{SCHOOL.principal}</div>
        <div className="text-xs text-slate-500">{SCHOOL.role}</div>
      </div>
      <div className="w-9 h-9 rounded-full bg-gradient-to-br from-ochre-500 to-gum-600 text-white flex items-center justify-center font-semibold text-sm">KA</div>
    </div>
  </header>
);

const Sidebar = ({ view, setView }) => (
  <aside className="w-64 shrink-0 bg-ink-950 text-slate-100 h-screen sticky top-0 flex flex-col">
    <div className="px-5 py-4 border-b border-slate-800">
      <div className="text-sm font-semibold leading-tight">School<br/>Project</div>
      <div className="text-[10px] uppercase tracking-wider text-ochre-400 mt-1">{SCHOOL.location}</div>
    </div>
    <nav className="flex-1 overflow-y-auto py-2">
      {NAV.map(n => (
        <button key={n.id} onClick={() => setView(n.id)}
          className={`w-full text-left px-5 py-2 text-sm flex items-center gap-2 hover:bg-slate-800/60 ${view===n.id?'bg-slate-800/80 border-l-4 border-ochre-500 pl-4 font-medium':''}`}>
          <span className="text-base">{n.icon}</span>{n.label}
        </button>
      ))}
    </nav>
    <div className="px-5 py-4 text-[11px] text-slate-400 border-t border-slate-800">
      v1.0 · {fmtDate(TODAY)} · Founding Principal artefact
    </div>
  </aside>
);

/* ========== APP ========== */
const App = () => {
  const [view, setView] = useState('dashboard');
  const [healthOpen, setHealthOpen] = useState(false);
  const [boardPackOpen, setBoardPackOpen] = useState(false);
  const [state, setState] = useState({
    phaseId: 'P1',
    risks: RISKS,
  });

  const M = (() => {
    switch(view){
      case 'dashboard':   return <Dashboard state={state} setView={setView} setHealthOpen={setHealthOpen} setBoardPackOpen={setBoardPackOpen} />;
      case 'roadmap':     return <Roadmap state={state} />;
      case 'compliance':  return <Compliance />;
      case 'staffing':    return <Staffing />;
      case 'curriculum':  return <Curriculum />;
      case 'resources':   return <Resources />;
      case 'operations':  return <Operations />;
      case 'risks':       return <Risks state={state} setState={setState} />;
      case 'stakeholders':return <Stakeholders />;
      case 'budget':      return <Budget />;
      case 'marketing':   return <Marketing />;
      case 'comparators': return <Comparators />;
      case 'variables':   return <Variables />;
      case 'reports':     return <Reports state={state} />;
      default: return null;
    }
  })();

  return (
    <div className="min-h-screen flex bg-slate-50">
      <Sidebar view={view} setView={setView} />
      <div className="flex-1 min-w-0">
        <TopBar view={view} setHealthOpen={setHealthOpen} />
        <main className="p-5 max-w-[1600px] mx-auto">{M}</main>
      </div>
      <Modal open={healthOpen} onClose={() => setHealthOpen(false)} title="Foundation Health Check — 12 pillars">
        <HealthCheckBody />
      </Modal>
      <Modal open={boardPackOpen} onClose={() => setBoardPackOpen(false)} title="Generate Founding Board Pack">
        <div className="text-sm text-slate-700 space-y-3">
          <p>The board pack assembles live console data into a 7-section PDF: Phases · Health · Risks · Budget · Staffing · Stakeholders · NSW Compliance.</p>
          <p>Use it as the artefact for board meeting #1, as evidence to the capital partner, and as a starting point for NESA narrative documents.</p>
          <Btn tone="primary" full onClick={() => { exportBoardPDF(state); setBoardPackOpen(false); }}>Download Board Pack (PDF)</Btn>
        </div>
      </Modal>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
