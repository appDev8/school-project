  return (
    <div className="space-y-5">
      <Section title="Variable Interaction Matrix" subtitle="Decisions never move only one variable. Strength 0–5; darker = stronger second-order effect.">
        <div className="overflow-x-auto">
          <table className="text-[10px] border-collapse">
            <thead><tr><th></th>{VARIABLES.map(v => <th key={v.id} className="px-1 py-1 font-medium text-slate-700 vertical">{v.id}</th>)}</tr></thead>
            <tbody>
              {VARIABLES.map(r => (
                <tr key={r.id}>
                  <th className="text-right pr-2 font-medium text-slate-700 whitespace-nowrap" title={r.label}>{r.id} · {r.label.slice(0,28)}</th>
                  {VARIABLES.map(c => {
                    const s = grid[r.id][c.id];
                    return (<td key={c.id} className={'border border-white ' + cellTone(s) + ' text-center w-7 h-7'} title={r.label + ' ↔ ' + c.label + ': ' + s}>{s||''}</td>);
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Section>
      <Section title="Strongest interactions with implications">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-600 text-xs uppercase"><tr><th className="text-left py-2 px-2">A</th><th className="text-left py-2 px-2">B</th><th className="text-left py-2 px-2">Strength</th><th className="text-left py-2 px-2">Implication</th></tr></thead>
            <tbody>
              {[...INTERACTIONS].sort((a,b)=>b[2]-a[2]).map(([a,b,s,note],i) => {
                const A = VARIABLES.find(v=>v.id===a).label;
                const B = VARIABLES.find(v=>v.id===b).label;
                return (
                  <tr key={i} className="border-t border-slate-100">
                    <td className="py-2 px-2 text-slate-700">{A}</td>
                    <td className="py-2 px-2 text-slate-700">{B}</td>
                    <td className="py-2 px-2"><span className={'text-xs font-semibold px-1.5 py-0.5 rounded ' + (s===5?'bg-rose-100 text-rose-700':s===4?'bg-amber-100 text-amber-700':'bg-emerald-100 text-emerald-700')}>{s}</span></td>
                    <td className="py-2 px-2 text-slate-700">{note}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Section>
    </div>
  );
};

const Reports = ({ state }) => {
  const { exportBoardPDF, exportPitchPPTX } = window.__SP_MODULES_PART_A__;
  return (
    <div className="space-y-5">
      <Section title="Reports Studio — live exports" subtitle="Every report is generated from the CURRENT state of the platform (including any risks you've added).">
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div className="border border-slate-200 rounded-xl p-4">
            <div className="text-2xl">📑</div>
            <div className="font-semibold mt-1">Founding Board Pack (PDF)</div>
            <div className="text-xs text-slate-500 mt-1">5 sections · Stages · Health · Risk Register · Staffing · NSW Reg Mapping</div>
            <Btn full tone="accent" onClick={()=>exportBoardPDF(state)}>Generate now</Btn>
          </div>
          <div className="border border-slate-200 rounded-xl p-4">
            <div className="text-2xl">🎬</div>
            <div className="font-semibold mt-1">Founding Pitch (PPTX)</div>
            <div className="text-xs text-slate-500 mt-1">5 slides · Case · Stages · Risks (PMBOK 8) · Finance</div>
            <Btn full tone="accent" onClick={()=>exportPitchPPTX(state)}>Generate now</Btn>
          </div>
          <div className="border border-slate-200 rounded-xl p-4">
            <div className="text-2xl">📊</div>
            <div className="font-semibold mt-1">Operating CSVs (×6)</div>
            <div className="text-xs text-slate-500 mt-1">Risks · Staffing · Stakeholders · LMS · Reg Mapping · Stages</div>
            <div className="space-y-1 mt-2">
              <Btn full size="sm" tone="ghost" onClick={()=>exportCSV('SchoolProject_RiskRegister.csv', ['ID','Kind','Title','Cat','L','C','LxC','Owner','Review','Response','Status'], state.risks.map(r=>[r.id,r.kind,r.title,r.cat,r.L,r.C,r.L*r.C,r.owner,r.review,r.mitig,r.status]))}>Risk register (live)</Btn>
              <Btn full size="sm" tone="ghost" onClick={()=>exportCSV('SchoolProject_StaffingPlan.csv', ['Stage','Role','FTE','Status','$k pp','Critical','Depends','Basis'], STAFF_PLAN.map(s=>[s.stage,s.role,s.count,s.status,s.salaryK,s.critical?'Yes':'No',s.depends,s.basis]))}>Staffing plan</Btn>
              <Btn full size="sm" tone="ghost" onClick={()=>exportCSV('SchoolProject_Stakeholders.csv', ['Group','Stakeholder','Interest','Influence','Strategy','Cadence','Owner'], STAKEHOLDERS.map(s=>[s.group,s.name,s.interest,s.influence,s.strategy,s.cadence,s.owner]))}>Stakeholders</Btn>
              <Btn full size="sm" tone="ghost" onClick={()=>exportCSV('SchoolProject_LMS_SIS.csv', ['Tool','Type','PBL fit','Cost','NSW','Pros','Cons'], LMS_OPTIONS.map(o=>[o.name,o.type,o.pbl,o.cost,o.nsw,o.pros,o.cons]))}>LMS / SIS evaluation</Btn>
              <Btn full size="sm" tone="ghost" onClick={()=>exportCSV('SchoolProject_NSWRegMapping.csv', ['Category','Item','Basis','Earliest','Due','Status','Owner','Cost','Notes'], COMPLIANCE.map(c=>c))}>NSW reg mapping</Btn>
              <Btn full size="sm" tone="ghost" onClick={()=>exportCSV('SchoolProject_Stages.csv', ['ID','Stage','Window','Status','Primary domains','Outputs','Constraints'], STAGES.map(s=>[s.id,s.name,s.start+'→'+s.end,s.status,s.primary.join('; '),s.output.join('; '),s.constraints]))}>Stages</Btn>
            </div>
          </div>
        </div>
      </Section>
      <Section title="What each report demonstrates at interview">
        <ul className="text-sm space-y-2 list-disc pl-5 text-slate-700">
          <li><b>Board Pack</b> — proves the founding artefact for board meeting #1 is already written.</li>
          <li><b>Pitch Deck</b> — 5 slides that survive a 5-minute board chair stress-test.</li>
          <li><b>Risk Register (PMBOK 8)</b> — proves competence with the current PMI standard, including positive risks (opportunities).</li>
          <li><b>Staffing Plan</b> — proves the IEU MEA 2025–2028 is understood; sequencing is dependency-driven.</li>
          <li><b>NSW Reg Mapping</b> — proves NESA Section 83 path, premises, child safe, DSE, privacy, WHS, Aboriginal Education are mapped end-to-end.</li>
        </ul>
      </Section>
    </div>
  );
};

const HealthCheckBody = () => {
  const overall = Math.round(HEALTH_PILLARS.reduce((s,p)=>s+p.score,0)/HEALTH_PILLARS.length);
  return (
    <div>
      <div className="text-center">
        <div className="text-5xl font-bold text-slate-900">{overall}<span className="text-2xl text-slate-500">/100</span></div>
        <div className="text-sm text-slate-500 mt-1">Composite Foundation Health Score · PRE-APPOINTMENT</div>
      </div>
      <div className="space-y-2 mt-4">
        {HEALTH_PILLARS.map(p => (
          <div key={p.key} className="border border-slate-200 rounded-lg p-2.5">
            <div className="flex items-center justify-between"><span className="font-medium text-slate-900 flex items-center gap-2"><StatusDot tone={p.tone}/>{p.label}</span><span className="text-sm font-semibold text-slate-700">{p.score}/100</span></div>
            <div className="text-xs text-slate-600 mt-1">{p.note}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

const TopBar = ({ view }) => (
  <header className="sticky top-0 z-20 bg-white border-b border-slate-200 px-5 py-3 flex items-center justify-between">
    <div>
      <div className="text-xs uppercase tracking-wider text-slate-500 font-medium">School Project · Founding Principal Console</div>
      <div className="text-lg font-semibold text-slate-900">{NAV.find(n=>n.id===view)?.label}</div>
    </div>
    <div className="flex items-center gap-3">
      <div className="hidden lg:block text-right">
        <div className="text-sm font-medium text-slate-900">Dr Khaled Altarawneh</div>
        <div className="text-xs text-slate-500">Founding Principal designate</div>
      </div>
      <div className="w-9 h-9 rounded-full bg-gradient-to-br from-ochre-500 to-gum-600 text-white flex items-center justify-center font-semibold text-sm">SP</div>
    </div>
  </header>
);

const Sidebar = ({ view, setView }) => (
  <aside className="w-64 shrink-0 bg-ink-950 text-slate-100 h-screen sticky top-0 flex flex-col">
    <div className="px-5 py-4 border-b border-slate-800">
      <div className="text-sm font-semibold leading-tight">School<br/>Project</div>
      <div className="text-[10px] uppercase tracking-wider text-ochre-400 mt-1">{SCHOOL.location}</div>
      <div className="text-[10px] text-sky-300 mt-1">CANDIDATE · Dr Khaled Altarawneh</div>
    </div>
    <nav className="flex-1 overflow-y-auto py-2">
      {NAV.map(n => (
        <button key={n.id} onClick={()=>setView(n.id)} className={'w-full text-left px-5 py-2 text-sm flex items-center gap-2 hover:bg-slate-800/60 ' + (view===n.id?'bg-slate-800/80 border-l-4 border-ochre-500 pl-4 font-medium':'')}>
          <span className="text-base">{n.icon}</span>{n.label}
        </button>
      ))}
    </nav>
    <div className="px-5 py-4 text-[11px] text-slate-400 border-t border-slate-800">v2.0 · {fmtDate(TODAY)} · PMBOK 8 · NESA Section 83</div>
  </aside>
);

const App = () => {
  const { Dashboard } = window.__SP_MODULES_PART_A__;
  const { PMBOKView, Roadmap, Compliance, Staffing, PBL, LMS } = window.__SP_MODULES_PART_B__;
  const { PrincipalProfile, EducationalModel, SampleUnits, WilPartnerships, ArtefactsRegister, HRSuite } = window.__SP_MODULES_PART_D__;
  const [view, setView] = useState('dashboard');
  const [healthOpen, setHealthOpen] = useState(false);
  const [state, setState] = useState({ risks: RISKS });

  const M = (() => {
    switch(view){
      case 'dashboard':   return <Dashboard state={state} setView={setView} setHealthOpen={setHealthOpen} />;
      case 'principal':   return <PrincipalProfile />;
      case 'pmbok':       return <PMBOKView />;
      case 'roadmap':     return <Roadmap />;
      case 'model':       return <EducationalModel />;
      case 'units':       return <SampleUnits />;
      case 'wil':         return <WilPartnerships />;
      case 'pbl':         return <PBL />;
      case 'lms':         return <LMS />;
      case 'compliance':  return <div className="space-y-5"><Compliance /><ArtefactsRegister /></div>;
      case 'staffing':    return <HRSuite />;
      case 'risks':       return <Risks state={state} setState={setState} />;
      case 'stakeholders':return <Stakeholders />;
      case 'budget':      return <Budget />;
      case 'comparators': return <Comparators />;
      case 'variables':   return <Variables />;
      case 'reports':     return <Reports state={state} />;
      default: return null;
    }
  })();

  return (
    <div className="min-h-screen flex bg-slate-50">
      <Sidebar view={view} setView={setView} />
      <div className="flex-1 min-w-0">
        <TopBar view={view} />
        <main className="p-5 max-w-[1600px] mx-auto">{M}</main>
      </div>
      <Modal open={healthOpen} onClose={()=>setHealthOpen(false)} title="Foundation Health Check — 12 pillars" wide>
        <HealthCheckBody />
      </Modal>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
