  const sz = size==='sm' ? 'px-2.5 py-1 text-xs' : 'px-3.5 py-2 text-sm';
  const map = {
    primary:'bg-itq-800 text-white hover:bg-itq-700 border-itq-800',
    ghost:'bg-white text-itq-800 hover:bg-sand border-sand',
    accent:'bg-bronze-500 text-white hover:bg-bronze-400 border-bronze-500',
    success:'bg-emerald-600 text-white hover:bg-emerald-700 border-emerald-600',
    danger:'bg-terra-600 text-white hover:bg-terra-700 border-terra-500',
  };
  return <button onClick={onClick} className={`${sz} ${map[tone]} ${full?'w-full justify-center':''} border rounded-lg font-medium inline-flex items-center gap-1.5 transition`}>{icon} {children}</button>;
};

const Modal = ({ open, onClose, title, children, wide }) => {
  if (!open) return null;

    <div className="fixed inset-0 z-50 bg-ink/60 flex items-center justify-center p-4" onClick={onClose}>

        <div className="p-5">{children}</div>
      </div>
    </div>
  );
};

const Plot = ({ type, data, options, height=180 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (ref.current._chart) ref.current._chart.destroy();
    ref.current._chart = new window.Chart(ref.current, { type, data, options });
    return () => { if (ref.current && ref.current._chart) ref.current._chart.destroy(); };
  }, [JSON.stringify(data), JSON.stringify(options), type]);
  return <div style={{ height }}><canvas ref={ref}></canvas></div>;
};

                <div className="flex items-center gap-2"><Pill tone="green">{h.salary}</Pill><span className="text-slate-400">{open===h.id?'−':'+'}</span></div>
              </button>
              {open===h.id && (
                <div className="px-3 pb-3 text-sm space-y-2 border-t border-sand pt-2">
                  <div><b className="text-itq-900">Purpose:</b> <span className="text-slate-600">{h.pd}</span></div>
                  <div className="grid sm:grid-cols-2 gap-2 text-xs">
                    <div className="bg-sand rounded-lg p-2"><b>Experience:</b> {h.years}</div>
                    <div className="bg-sand rounded-lg p-2"><b>Accreditation:</b> {h.accred}</div>
                  </div>
                  <div><b className="text-itq-900">Selection criteria:</b><ul className="list-disc ml-5 text-slate-600 mt-1">{h.sc.map((c,i)=>(<li key={i}>{c}</li>))}</ul></div>
                </div>
              )}
            </div>
          ))}
        </div>
      </Section>
    </div>
  );
};

/* ===== RISK REGISTER (live) ===== */
const RiskRegister = ({ state }) => {
  const { risks, setRisks } = state;
  const [add, setAdd] = useState(false);
  const [form, setForm] = useState({ kind:'threat', title:'', cat:'', L:3, C:3, owner:'', response:'' });
  const cycle = (id) => setRisks(rs=>rs.map(r=>r.id===id?{...r, status: r.status==='open'?'monitor':r.status==='monitor'?'closed':r.status==='pursue'?'realised':'open'}:r));
  const setLC = (id, key, v) => setRisks(rs=>rs.map(r=>r.id===id?{...r,[key]:Number(v)}:r));
  const sorted = [...risks].sort((a,b)=>(b.L*b.C)-(a.L*a.C));
  const submit = () => { if(!form.title) return; const pre=form.kind==='threat'?'T':'O'; const n=risks.filter(r=>r.kind===form.kind).length+1; setRisks(rs=>[...rs,{...form, id:pre+'-'+String(n).padStart(2,'0'), L:Number(form.L), C:Number(form.C), status:form.kind==='threat'?'open':'pursue'}]); setForm({ kind:'threat', title:'', cat:'', L:3, C:3, owner:'', response:'' }); setAdd(false); };
  return (
    <Section title="Risk register — PMBOK 8 (threats + opportunities)" subtitle="Live · adjust L/C, cycle status, add entries"
      right={<>
        <Btn size="sm" tone="primary" onClick={()=>setAdd(true)}>+ Add</Btn>
        <Btn size="sm" tone="ghost" onClick={()=>exportCSV('TheItqanWay_RiskRegister.csv',['ID','Kind','Title','Cat','L','C','LxC','Owner','Response','Status'],risks.map(r=>[r.id,r.kind,r.title,r.cat,r.L,r.C,r.L*r.C,r.owner,r.response,r.status]))}>CSV</Btn>
      </>}>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead><tr className="text-left text-bronze-700 border-b border-sand"><th className="py-2 pr-2">ID</th><th className="py-2 px-1">Risk / Opportunity</th><th className="py-2 px-1">Cat</th><th className="py-2 px-1">L</th><th className="py-2 px-1">C</th><th className="py-2 px-1">L×C</th><th className="py-2 px-1">Owner</th><th className="py-2 px-1">Status</th></tr></thead>
          <tbody>
            {sorted.map(r=>{ const sc=r.L*r.C; const scTone=sc>=16?'bg-rose-100 text-rose-800':sc>=9?'bg-amber-100 text-amber-800':'bg-emerald-100 text-emerald-800';
              return (
              <tr key={r.id} className={'border-b border-sand/60 align-top ' + (r.kind==='opportunity'?'bg-olive-50/40':'')}>
                <td className="py-2 pr-2"><Pill tone={r.kind==='threat'?'terra':'olive'}>{r.id}</Pill></td>
                <td className="py-2 px-1"><div className="text-itq-900 font-medium">{r.title}</div><div className="text-xs text-slate-500">{r.response}</div></td>
                <td className="py-2 px-1 text-slate-600 text-xs">{r.cat}</td>
                <td className="py-2 px-1"><select value={r.L} onChange={e=>setLC(r.id,'L',e.target.value)} className="border border-sand rounded px-1 py-0.5 text-xs">{[1,2,3,4,5].map(n=><option key={n}>{n}</option>)}</select></td>
                <td className="py-2 px-1"><select value={r.C} onChange={e=>setLC(r.id,'C',e.target.value)} className="border border-sand rounded px-1 py-0.5 text-xs">{[1,2,3,4,5].map(n=><option key={n}>{n}</option>)}</select></td>
                <td className="py-2 px-1"><span className={'text-xs font-semibold px-1.5 py-0.5 rounded '+scTone}>{sc}</span></td>
                <td className="py-2 px-1 text-slate-600 text-xs">{r.owner}</td>
                <td className="py-2 px-1"><button onClick={()=>cycle(r.id)} className="text-xs underline text-itq-700">{r.status}</button></td>
              </tr>
            );})}
          </tbody>
        </table>
      </div>
      <Modal open={add} onClose={()=>setAdd(false)} title="Add risk / opportunity">
        <div className="space-y-3 text-sm">
          <div className="flex gap-2">{['threat','opportunity'].map(k=>(<Btn key={k} size="sm" tone={form.kind===k?'primary':'ghost'} onClick={()=>setForm({...form,kind:k})}>{k}</Btn>))}</div>
          <input className="w-full border border-sand rounded-lg px-3 py-2" placeholder="Title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
          <div className="grid grid-cols-2 gap-2">
            <input className="border border-sand rounded-lg px-3 py-2" placeholder="Category" value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})}/>
            <input className="border border-sand rounded-lg px-3 py-2" placeholder="Owner" value={form.owner} onChange={e=>setForm({...form,owner:e.target.value})}/>
            <label className="text-xs text-slate-500">Likelihood<select className="w-full border border-sand rounded-lg px-2 py-1.5" value={form.L} onChange={e=>setForm({...form,L:e.target.value})}>{[1,2,3,4,5].map(n=><option key={n}>{n}</option>)}</select></label>
            <label className="text-xs text-slate-500">Consequence<select className="w-full border border-sand rounded-lg px-2 py-1.5" value={form.C} onChange={e=>setForm({...form,C:e.target.value})}>{[1,2,3,4,5].map(n=><option key={n}>{n}</option>)}</select></label>
          </div>
          <textarea className="w-full border border-sand rounded-lg px-3 py-2" placeholder="Response strategy" value={form.response} onChange={e=>setForm({...form,response:e.target.value})}/>
          <Btn full tone="primary" onClick={submit}>Add to register</Btn>
        </div>
      </Modal>
    </Section>
  );
};

/* ===== FINANCE ===== */
const Budget = () => {
  const tCapex = BUDGET.capex.reduce((a,b)=>a+b.amount,0);
  const tOpex = BUDGET.opexYear1.reduce((a,b)=>a+b.amount,0);
  const tRev = BUDGET.revenueYear1.reduce((a,b)=>a+b.amount,0);
  const Row = ({ x }) => (<div className="flex justify-between py-1.5 text-sm border-b border-sand/60"><span className="text-slate-700">{x.item} {x.flag && <Flag k={x.flag}/>}</span><span className="text-itq-900 font-medium">{fmtAUD(x.amount)}</span></div>);
  return (
    <div className="space-y-5">
      <Section title="Finance — single-stage launch" subtitle={'~' + ENROL_Y1 + ' Year-7 students'} right={<><Flag k="plan"/><Flag k="verify"/></>}>
        <div className="text-xs text-slate-500 mb-3">{BUDGET.basis}</div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-sm">
          <div className="bg-sand rounded-lg p-3"><div className="text-xs text-slate-500">Capex plan</div><div className="text-lg font-semibold serif">{fmtAUD(tCapex)}</div></div>
          <div className="bg-sand rounded-lg p-3"><div className="text-xs text-slate-500">Year-1 opex</div><div className="text-lg font-semibold serif">{fmtAUD(tOpex)}</div></div>
          <div className="bg-olive-50 rounded-lg p-3"><div className="text-xs text-olive-700">Year-1 revenue</div><div className="text-lg font-semibold serif text-olive-700">{fmtAUD(tRev)}</div></div>
          <div className={(tRev-tOpex>0?'bg-emerald-50':'bg-terra-50')+' rounded-lg p-3'}><div className={'text-xs '+(tRev-tOpex>0?'text-emerald-600':'text-terra-700')}>Year-1 net</div><div className={'text-lg font-semibold serif '+(tRev-tOpex>0?'text-emerald-700':'text-terra-700')}>{fmtAUD(tRev-tOpex)}</div></div>
        </div>
      </Section>
      <div className="grid md:grid-cols-3 gap-5">
        <Section title="Year-1 revenue"><Plot type="doughnut" height={150} data={{ labels: BUDGET.revenueYear1.map(x=>x.item.split(' (')[0]), datasets:[{ data: BUDGET.revenueYear1.map(x=>x.amount), backgroundColor:['#3a5a49','#9A7B4F'] }] }} options={{ plugins:{ legend:{ position:'bottom', labels:{ font:{size:9}, boxWidth:10 } } }, maintainAspectRatio:false }}/>{BUDGET.revenueYear1.map((x,i)=><Row key={i} x={x}/>)}</Section>
        <Section title="Year-1 opex">{BUDGET.opexYear1.map((x,i)=><Row key={i} x={x}/>)}</Section>
        <Section title="Capex plan">{BUDGET.capex.map((x,i)=><Row key={i} x={x}/>)}<div className="text-[11px] text-slate-500 mt-2">Funded via capital partner / waqf [plan].</div></Section>
      </div>
    </div>
  );
};

/* ===== ARTEFACTS REGISTER (live) ===== */
const ArtefactsRegister = ({ state }) => {
  const { artefacts, setArtefacts } = state;
  const ORDER = ['planned','drafting','review','complete'];
  const cycle = (id) => setArtefacts(a=>a.map(x=>x.id===id?{...x, status: ORDER[(ORDER.indexOf(x.status)+1)%ORDER.length]}:x));
  const [name, setName] = useState('');
  const add = () => { if(!name) return; const n='A-'+String(artefacts.length+1).padStart(2,'0'); setArtefacts(a=>[...a,{ id:n, name, phase:'Phase 1', owner:'HoS', maps:'—', status:'planned' }]); setName(''); };
  const done = artefacts.filter(a=>a.status==='complete').length;
  const pct = Math.round(done/artefacts.length*100);
  return (
    <Section title="Artefacts register" subtitle={done + ' of ' + artefacts.length + ' complete (' + pct + '%) · click a status to advance it'}
      right={<Btn size="sm" tone="ghost" onClick={()=>exportCSV('TheItqanWay_Artefacts.csv',['ID','Artefact','Phase','Owner','Maps to','Status'],artefacts.map(a=>[a.id,a.name,a.phase,a.owner,a.maps,a.status]))}>CSV</Btn>}>
      <div className="h-2 rounded-full bg-sand overflow-hidden mb-3"><div className="h-2 bg-itq-700" style={{ width: pct+'%' }}></div></div>
      <div className="flex gap-2 mb-3"><input className="flex-1 border border-sand rounded-lg px-3 py-2 text-sm" placeholder="New artefact…" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/><Btn tone="primary" onClick={add}>+ Add</Btn></div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead><tr className="text-left text-bronze-700 border-b border-sand"><th className="py-2 pr-2">ID</th><th className="py-2 px-2">Artefact</th><th className="py-2 px-2">Phase</th><th className="py-2 px-2">Owner</th><th className="py-2 px-2">Maps</th><th className="py-2 px-2">Status</th></tr></thead>
          <tbody>{artefacts.map(a=>(<tr key={a.id} className="border-b border-sand/60"><td className="py-2 pr-2 text-bronze-700 text-xs">{a.id}</td><td className="py-2 px-2 text-itq-900">{a.name}</td><td className="py-2 px-2 text-slate-600 text-xs">{a.phase}</td><td className="py-2 px-2 text-slate-600 text-xs">{a.owner}</td><td className="py-2 px-2 text-slate-600 text-xs">{a.maps}</td><td className="py-2 px-2"><button onClick={()=>cycle(a.id)}><Pill tone={a.status==='complete'?'good':a.status==='review'?'warn':a.status==='drafting'?'bronze':'idle'}>{a.status}</Pill></button></td></tr>))}</tbody>
        </table>
      </div>
    </Section>
  );
};

/* ===== REPORTS ===== */
const Reports = ({ state }) => {
  const { exportBoardPDF, exportPitchPPTX } = window.__SP_MODULES_PART_A__;
  return (
    <div className="space-y-5">
      <Section title="Reports & exports" subtitle="Every export is generated live from current platform state">
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
          <div className="border border-sand rounded-xl p-4 bg-white"><div className="font-semibold text-itq-900 serif">Founding Board Pack</div><div className="text-sm text-slate-600 mb-3">PDF · journey, NESA crosswalk, risk register, staffing & salaries, roadmap.</div><Btn full tone="accent" icon="📑" onClick={()=>exportBoardPDF(state)}>Generate PDF</Btn></div>
          <div className="border border-sand rounded-xl p-4 bg-white"><div className="font-semibold text-itq-900 serif">Vision Pitch</div><div className="text-sm text-slate-600 mb-3">PPTX · conviction, the journey, a real ’Amal Project, single-stage launch.</div><Btn full tone="accent" icon="🎬" onClick={()=>exportPitchPPTX(state)}>Generate PPTX</Btn></div>
          <div className="border border-sand rounded-xl p-4 bg-white"><div className="font-semibold text-itq-900 serif">Data exports (CSV)</div><div className="text-sm text-slate-600 mb-3">Open in Excel / Sheets.</div>
            <div className="space-y-2">
              <Btn full tone="ghost" onClick={()=>exportCSV('TheItqanWay_RiskRegister.csv',['ID','Kind','Title','Cat','L','C','LxC','Owner','Response','Status'],state.risks.map(r=>[r.id,r.kind,r.title,r.cat,r.L,r.C,r.L*r.C,r.owner,r.response,r.status]))}>Risk register</Btn>
              <Btn full tone="ghost" onClick={()=>exportCSV('TheItqanWay_Staffing.csv',['Role','Band','Yr1','Full'],PHASED_STAFFING.map(s=>[s.role,s.band,s.y1,s.full]))}>Staffing plan</Btn>
              <Btn full tone="ghost" onClick={()=>exportCSV('TheItqanWay_Artefacts.csv',['ID','Artefact','Phase','Owner','Maps','Status'],state.artefacts.map(a=>[a.id,a.name,a.phase,a.owner,a.maps,a.status]))}>Artefacts register</Btn>
            </div>
          </div>
        </div>
      </Section>
      <Section title="Closing — why this, why now" subtitle="A deep generalist, capable and grounded">
        <div className="bg-itq-800 text-white rounded-xl p-5 islimi">
          <div className="serif text-xl">{SCHOOL.oneLine}</div>
          <div className="text-sm text-white/85 mt-2">A child practises faith-as-excellence in real contexts hundreds of times before graduating — the habit that produces leaders who are capable <i>and</i> grounded.</div>
          <div className="text-xs text-white/70 mt-3">{SCHOOL.scholarNote}</div>
        </div>
      </Section>
    </div>
  );
};

window.__SP_MODULES_PART_D__ = { Staffing, RiskRegister, Budget, ArtefactsRegister, Reports };
</script>

<script type="text/babel" id="app-script">
const D = window.__SP_DATA__;
const { SCHOOL, NAV, RISKS, ARTEFACTS, HEALTH_PILLARS } = D;
const { toneBar, fmtDate, TODAY } = window.__SP_UTILS__;
const { useState } = window.__SP_HOOKS__;
const { StatusDot, Section, Btn, Modal } = window.__SP_UI__;
const { Dashboard, PrincipalProfile } = window.__SP_MODULES_PART_A__;
const { Vision, NamedSystem, Journey, Pedagogy, DayInLife, Manhal, Project, Manara } = window.__SP_MODULES_PART_B__;
const { Compliance, Roadmap, PMBOKView, Comparators, Pathways } = window.__SP_MODULES_PART_C__;
const { Staffing, RiskRegister, Budget, ArtefactsRegister, Reports } = window.__SP_MODULES_PART_D__;

const GROUPS = ['Overview','The Itqan Way','Registrable & Run','Evidence'];

const App = () => {
  const [view, setView] = useState('dashboard');
  const [risks, setRisks] = useState(RISKS);
  const [artefacts, setArtefacts] = useState(ARTEFACTS);
  const [healthOpen, setHealthOpen] = useState(false);
  const [navOpen, setNavOpen] = useState(false);
  const state = { risks, setRisks, artefacts, setArtefacts };
  const active = NAV.find(n=>n.key===view) || NAV[0];

  const render = () => {
    switch (view) {
      case 'dashboard': return <Dashboard state={state} setHealthOpen={setHealthOpen} />;
      case 'principal': return <PrincipalProfile />;
      case 'vision': return <Vision />;
      case 'system': return <NamedSystem />;
      case 'journey': return <Journey />;
      case 'pedagogy': return <Pedagogy />;
      case 'day': return <DayInLife />;
      case 'manhal': return <Manhal />;
      case 'project': return <Project />;
      case 'manara': return <Manara />;
      case 'compliance': return <Compliance />;
      case 'roadmap': return <Roadmap />;
      case 'pmbok': return <PMBOKView />;
      case 'staffing': return <Staffing />;
      case 'risks': return <RiskRegister state={state} />;
      case 'budget': return <Budget />;
      case 'comparators': return <Comparators />;
      case 'pathways': return <Pathways />;
      case 'artefacts': return <ArtefactsRegister state={state} />;
      case 'reports': return <Reports state={state} />;
      default: return <Dashboard state={state} setHealthOpen={setHealthOpen} />;
    }
  };

  return (
    <div className="min-h-screen flex">
      <aside className={`fixed lg:static z-40 w-72 shrink-0 h-screen overflow-y-auto bg-itq-900 text-white transition-transform ${navOpen?'translate-x-0':'-translate-x-full lg:translate-x-0'}`}>
        <div className="p-5 border-b border-white/10 islimi">
          <div className="text-[10px] uppercase tracking-[0.18em] text-bronze-50/80">Founding Head of School</div>
          <div className="serif text-2xl font-semibold leading-tight">The Itqan Way</div>
          <div className="text-[11px] text-white/70 mt-1">{SCHOOL.tagline}</div>
        </div>
        <nav className="p-3">
          {GROUPS.map(g=>(
            <div key={g} className="mb-3">
              <div className="text-[10px] uppercase tracking-wider text-bronze-400 px-3 mb-1">{g}</div>
              {NAV.filter(n=>n.group===g).map(n=>(
                <button key={n.key} onClick={()=>{ setView(n.key); setNavOpen(false); }}
                  className={`w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2.5 transition ${view===n.key?'bg-white/15 text-white font-medium':'text-white/75 hover:bg-white/10'}`}>
                  <span className="w-5 text-center opacity-90">{n.icon}</span>{n.label}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="p-4 text-[10px] text-white/50 border-t border-white/10">Candidate artefact · {SCHOOL.candidate}. Names to be reviewed with scholars (adab).</div>
      </aside>

      {navOpen && <div className="fixed inset-0 bg-ink/40 z-30 lg:hidden" onClick={()=>setNavOpen(false)}></div>}

      <main className="flex-1 min-w-0">
        <header className="sticky top-0 z-20 bg-cream/90 backdrop-blur border-b border-sand px-4 lg:px-6 py-3 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <button className="lg:hidden text-itq-800" onClick={()=>setNavOpen(true)}>☰</button>
            <div>
              <div className="text-[11px] uppercase tracking-wide text-bronze-700">{active.group}</div>
              <h1 className="serif text-xl font-semibold text-itq-900 leading-tight">{active.label}</h1>
            </div>
          </div>
          <div className="text-right text-xs text-slate-500 hidden sm:block">
            <div>{SCHOOL.type}</div>
            <div>{SCHOOL.location} · {fmtDate(TODAY)}</div>
          </div>
        </header>
        <div className="p-4 lg:p-6 max-w-7xl mx-auto">{render()}</div>
      </main>

      <Modal open={healthOpen} onClose={()=>setHealthOpen(false)} title="Foundation health check · 12 pillars" wide>
        <div className="grid sm:grid-cols-2 gap-3">
          {HEALTH_PILLARS.map(p=>(
            <div key={p.key} className="border border-sand rounded-lg p-3">
              <div className="flex items-center justify-between mb-1"><span className="text-sm text-itq-900 flex items-center gap-2"><StatusDot tone={p.tone}/>{p.label}</span><span className="text-sm text-slate-500 font-medium">{p.score}</span></div>
              <div className="h-1.5 rounded-full bg-sand overflow-hidden"><div className={'h-1.5 '+toneBar(p.tone)} style={{ width:p.score+'%' }}></div></div>
              <div className="text-[11px] text-slate-500 mt-1">{p.note}</div>
            </div>
          ))}
        </div>
      </Modal>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
