name: Deploy to GitHub Pages

# Builds the Vite app in vantage-app/ and publishes it to GitHub Pages.
# HashRouter + base=/school-project/ means deep links work on the project subpath
# without any server-side rewrites.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token; Pages deploy needs pages:write + id-token:write.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vantage-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vantage-app/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Project pages are served from /<repo>/, so assets need this prefix.
          VITE_BASE: /school-project/
      - name: Configure Pages
        # enablement:true flips the repo from legacy Pages to the Actions
        # build type on first run, so no manual settings toggle is required.
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          # Path is relative to the repo root, not the working-directory.
          path: vantage-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
